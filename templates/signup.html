{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Registration</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <style>
        body {
            background-image: url("{% static 'images/cta-bg.jpg' %}"); /* Background image */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .registration-container {
            display: flex;
            justify-content: space-between;
            background-color: rgba(30, 30, 30, 0.6); /* Transparent background (60% opacity) */
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            width: 400px;
            color: white;
        }

        .form-control {
            background-color: #2c2c2c;
            border: 1px solid #444;
            color: #fff;
        }

        .form-control:focus {
            background-color: #2c2c2c;
            border-color: #ff6600;
            box-shadow: none;
        }

        .btn-primary {
            background-color: #ff6600;
            border: none;
            width: 100%;
        }

        .btn-primary:hover {
            background-color: #ff8c33;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #ff6600;
            font-size: 24px;
        }

        .form-group label {
            color: #bbb;
        }

        a {
            color: #ff6600;
        }

        .submit-btn {
            grid-column: span 2;
        }

        /* For smaller screens */
        @media (max-width: 768px) {
            .registration-container {
                flex-direction: column;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="registration-container">
        <div class="form-box">
            <h2>User Registration</h2>
            <form action="" method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">User Name</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <label for="password_confirm">Confirm Password</label>
                    <input type="password" class="form-control" id="password_confirm" name="password_confirm" required>
                </div>
                <div class="form-group form-check">
                    <input type="checkbox" class="form-check-input" id="is_trainer" name="is_trainer">
                    <label class="form-check-label" for="is_trainer">I am a trainer</label>
                </div>
                <button type="submit" class="btn btn-primary submit-btn">Register</button>
            </form>
            <p class="mt-3">Already have an account? <a href="{% url 'login' %}">Log in here</a>.</p>
        </div>
    {% for message in messages %}
    <script>
        alert('{{message}}');
    </script>
    {% endfor %}
    </div>
</body>
</html>
